{% extends 'base.html' %}
{% block title %}Request Service | Neon Roo Computers & Upgrades{% endblock %}
{% block content %}
<div class="page-head mb-4"><h1>Request service</h1><p class="text-secondary mb-0">Submit a repair, upgrade, or build request and track it from your dashboard.</p></div>
<div class="card-glass p-4">
  <form method="post" class="row g-3">
    <div class="col-md-6"><label class="form-label">Service type</label><select name="service_type" class="form-select"><option>Repair</option><option>Upgrade</option><option>Custom Build</option><option>Diagnostic</option></select></div>
    <div class="col-md-6"><label class="form-label">Priority</label><select name="priority" class="form-select"><option>Normal</option><option>Rush</option></select></div>
    <div class="col-12"><label class="form-label">Request title</label><input type="text" name="title" class="form-control" required></div>
    <div class="col-md-3"><label class="form-label">Device make</label><input type="text" name="device_make" class="form-control"></div>
    <div class="col-md-3"><label class="form-label">Device model</label><input type="text" name="device_model" class="form-control"></div>
    <div class="col-md-3"><label class="form-label">Serial number</label><input type="text" name="serial_number" class="form-control"></div>
    <div class="col-md-3"><label class="form-label">Client budget</label><input type="number" step="0.01" name="client_budget" class="form-control"></div>
    <div class="col-12"><label class="form-label">Description</label><textarea name="description" rows="6" class="form-control" required></textarea></div>
    <div class="col-12"><button class="btn btn-neon">Submit request</button></div>
  </form>
</div>
{% endblock %}
