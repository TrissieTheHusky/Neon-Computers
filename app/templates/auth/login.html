{% extends 'base.html' %}
{% block title %}Login | Neon Roo Computers & Upgrades{% endblock %}
{% block content %}
<div class="mx-auto auth-card card-glass p-4 p-lg-5">
  <h1 class="h3 mb-3">Client login</h1>
  <p class="text-secondary">Access your repair status, messages, and payment requests.</p>
  <form method="post" class="row g-3">
    <div class="col-12"><label class="form-label">Email</label><input type="email" name="email" class="form-control form-control-lg" required></div>
    <div class="col-12"><label class="form-label">Password</label><input type="password" name="password" class="form-control form-control-lg" required></div>
    <div class="col-12"><button class="btn btn-neon w-100">Login</button></div>
  </form>
</div>
{% endblock %}
